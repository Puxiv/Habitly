name: PulseDen
options:
  bundleIdPrefix: com.puxi
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  SWIFT_VERSION: "5.9"

targets:
  PulseDen:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PulseDen
    entitlements:
      path: PulseDen/PulseDen.entitlements
      properties:
        com.apple.developer.healthkit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.puxi.PulseDen
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
    info:
      path: PulseDen/Info.plist
      properties:
        CFBundleDisplayName: PulseDen
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSupportsIndirectInputEvents: true
        UIRequiresFullScreen: true
        NSLocationWhenInUseUsageDescription: "Your location is used to show local weather on the Dashboard"
        NSPhotoLibraryUsageDescription: "Add photos to your saved items"
        NSHealthShareUsageDescription: "PulseDen reads your health data to show sleep, heart rate, and activity on your Dashboard"
