name: Habitly
options:
  bundleIdPrefix: com.puxi
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  SWIFT_VERSION: "5.9"

targets:
  Habitly:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Habitly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.puxi.Habitly
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
    info:
      path: Habitly/Info.plist
      properties:
        CFBundleDisplayName: Habitly
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSupportsIndirectInputEvents: true
        UIRequiresFullScreen: true
        NSPhotoLibraryUsageDescription: "Add photos to your saved items"
        NSLocationWhenInUseUsageDescription: "Habitly uses your location to show current weather conditions and forecasts."
