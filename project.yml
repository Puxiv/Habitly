name: GrogyBot
options:
  bundleIdPrefix: com.puxi
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  SWIFT_VERSION: "5.9"

targets:
  GrogyBot:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GrogyBot
    entitlements:
      path: GrogyBot/GrogyBot.entitlements
      properties:
        com.apple.developer.healthkit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.puxi.GrogyBot
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
    info:
      path: GrogyBot/Info.plist
      properties:
        CFBundleDisplayName: GrogyBot
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSupportsIndirectInputEvents: true
        UIRequiresFullScreen: true
        NSLocationWhenInUseUsageDescription: "Your location is used to show local weather on the Dashboard"
        NSPhotoLibraryUsageDescription: "Add photos to your saved items"
        NSHealthShareUsageDescription: "GrogyBot reads your health data to show sleep, heart rate, and activity on your Dashboard"
        NSMicrophoneUsageDescription: "Grogy uses the microphone to hear your voice commands"
        NSSpeechRecognitionUsageDescription: "Grogy uses speech recognition to convert your voice to text"
